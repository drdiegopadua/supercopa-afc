<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pré-Inscrição · SUPERCOPA 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --bg:#07090d;
  --surface:#0d1018;
  --card:#111520;
  --border:rgba(255,255,255,0.07);

  --accent:#3a86f0;
  --accent2:#e85d3a;

  --text:#e8eaf0;
  --muted:#5a6174;

  --green:#4ade80;
  --green-bg:rgba(74,222,128,0.08);

  --D:'Bebas Neue',sans-serif;
  --B:'DM Sans',sans-serif;
  --M:'Space Mono',monospace;
}

html{
  scroll-behavior:smooth;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--B);
  overflow-x:hidden;
  padding-top:105px;
}

/* HEADER */

header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:1000;
}

.urgency-bar{
  background:var(--accent);
  color:#000;
  text-align:center;
  padding:11px;
  font-family:var(--M);
  font-size:12px;
  letter-spacing:2px;
  font-weight:700;
  overflow:hidden;
  position:relative;
}

.urgency-bar::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);
  animation:shine 2.5s linear infinite;
}

@keyframes shine{
  from{transform:translateX(-100%)}
  to{transform:translateX(100%)}
}

nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:18px 48px;
  background:rgba(7,9,13,0.95);
  border-bottom:1px solid var(--border);
}

.nav-logo{
  font-family:var(--D);
  font-size:26px;
  letter-spacing:3px;
  color:var(--accent);
  text-decoration:none;
}

.nav-logo span{
  color:rgba(255,255,255,0.3);
}

.nav-links{
  display:flex;
  gap:32px;
  list-style:none;
}

.nav-links a{
  color:var(--muted);
  text-decoration:none;
  font-size:12px;
  font-weight:500;
  letter-spacing:1.5px;
  text-transform:uppercase;
  transition:.2s;
}

.nav-links a:hover{
  color:var(--text);
}

.nav-back{
  display:inline-flex;
  align-items:center;
  gap:8px;
  color:var(--muted);
  text-decoration:none;
  font-size:12px;
  font-weight:500;
  letter-spacing:1.5px;
  text-transform:uppercase;
  transition:.2s;
}

.nav-back:hover{
  color:var(--accent);
}

/* HERO */

.page-hero{
  position:relative;
  overflow:hidden;
  padding:72px 24px 56px;
  text-align:center;
}

.hero-dots{
  position:absolute;
  inset:0;
  pointer-events:none;

  background-image:
  radial-gradient(circle,rgba(58,134,240,0.06) 1px,transparent 1px);

  background-size:38px 38px;
  animation:dotsDrift 28s linear infinite;
}

@keyframes dotsDrift{
  from{background-position:0 0}
  to{background-position:38px 38px}
}

.hero-glow{
  position:absolute;
  top:-80px;
  left:50%;
  transform:translateX(-50%);

  width:700px;
  height:400px;

  background:
  radial-gradient(
    ellipse at 50% 30%,
    rgba(58,134,240,0.12) 0%,
    rgba(58,134,240,0.04) 45%,
    transparent 72%
  );
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;

  padding:6px 20px;
  border-radius:100px;

  background:rgba(58,134,240,0.10);
  border:1px solid rgba(58,134,240,0.28);

  font-family:var(--M);
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;

  color:var(--accent);

  position:relative;
  z-index:2;
}

.badge-dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 6px var(--accent);
  animation:blink 1.4s infinite;
}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:.2}
}

.page-hero h1{
  margin-top:28px;

  font-family:var(--D);
  font-size:clamp(2.4rem,7vw,4.8rem);
  line-height:1;
  letter-spacing:.08em;
  text-transform:uppercase;

  background:
  linear-gradient(
    155deg,
    #a8d0ff 0%,
    #3a86f0 22%,
    #ffffff 50%,
    #3a86f0 72%,
    #1a4a9e 100%
  );

  background-size:200% 200%;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:titleShine 4.5s ease-in-out infinite alternate;

  position:relative;
  z-index:2;
}

.page-hero em{
  font-style:normal;
}

@keyframes titleShine{
  from{background-position:0% 50%}
  to{background-position:100% 50%}
}

.page-hero p{
  max-width:520px;
  margin:18px auto 0;

  color:var(--muted);
  font-size:16px;
  line-height:1.7;

  position:relative;
  z-index:2;
}

/* BENEFÍCIOS */

.benefits-bar{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:12px;

  padding-top:28px;

  position:relative;
  z-index:2;
}

.benefit-pill{
  display:flex;
  align-items:center;
  gap:8px;

  padding:8px 18px;
  border-radius:100px;

  background:var(--green-bg);
  border:1px solid rgba(74,222,128,0.25);

  color:var(--green);

  font-family:var(--M);
  font-size:11px;
  letter-spacing:1.5px;
  text-transform:uppercase;
}

/* FORM */

.form-wrap{
  max-width:720px;
  margin:56px auto 80px;
  padding:0 24px;
}

.form-card{
  overflow:hidden;
  border-radius:16px;

  background:var(--card);
  border:1px solid var(--border);

  position:relative;
}

.form-card::before{
  content:'';
  position:absolute;
  top:0;
  left:8%;
  right:8%;
  height:1px;

  background:
  linear-gradient(
    to right,
    transparent,
    rgba(58,134,240,0.7),
    rgba(255,255,255,0.3),
    rgba(58,134,240,0.7),
    transparent
  );
}

.form-section{
  padding:36px 40px;
  border-bottom:1px solid var(--border);
}

.form-section:last-of-type{
  border-bottom:none;
}

.form-section-title{
  font-family:var(--D);
  font-size:22px;
  letter-spacing:1.5px;
}

.form-section-sub{
  margin-top:6px;
  margin-bottom:28px;
  font-size:13px;
  color:var(--muted);
}

.field-group{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-bottom:16px;
}

.field-group.single{
  grid-template-columns:1fr;
}

.field{
  display:flex;
  flex-direction:column;
  gap:7px;
}

.field label{
  font-family:var(--M);
  font-size:10px;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:var(--accent);
}

.field input,
.field select{
  width:100%;
  padding:13px 16px;

  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:6px;

  color:var(--text);

  font-size:15px;
  font-family:var(--B);

  outline:none;

  transition:.2s;
}

.field input::placeholder{
  color:var(--muted);
}

.field input:focus,
.field select:focus{
  border-color:var(--accent);
  background:rgba(58,134,240,0.06);
  box-shadow:0 0 0 3px rgba(58,134,240,0.12);
}

.field input.error,
.field select.error{
  border-color:var(--accent2)!important;
  box-shadow:0 0 0 3px rgba(232,93,58,0.12)!important;
}

.field-error{
  display:none;
  font-size:11px;
  color:var(--accent2);
}

/* MODALIDADE */

.mod-toggle{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.mod-opt{
  position:relative;
}

.mod-opt input{
  position:absolute;
  opacity:0;
}

.mod-label{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;

  padding:20px 16px;
  border-radius:8px;

  background:rgba(255,255,255,0.02);
  border:1px solid var(--border);

  text-align:center;
  cursor:pointer;

  transition:.2s;
}

.mod-opt input:checked + .mod-label{
  border-color:var(--accent);
  background:rgba(58,134,240,0.08);
  box-shadow:0 0 0 3px rgba(58,134,240,0.12);
}

.m-icon{
  font-size:28px;
}

.m-sub{
  color:var(--muted);
  font-size:10px;
  letter-spacing:1.5px;
  font-family:var(--M);
}

/* ALOJAMENTO */

.aloj-toggle{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.toggle-opt{
  position:relative;
}

.toggle-opt input{
  position:absolute;
  opacity:0;
}

.toggle-label{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;

  padding:16px;
  border-radius:8px;

  background:rgba(255,255,255,0.02);
  border:1px solid var(--border);

  cursor:pointer;
  transition:.2s;
}

.toggle-opt input:checked + .toggle-label{
  border-color:var(--accent);
  background:rgba(58,134,240,0.08);
  box-shadow:0 0 0 3px rgba(58,134,240,0.12);
}

.aloj-qty{
  display:none;
  margin-top:16px;
}

.aloj-qty.visible{
  display:block;
}

.aloj-note{
  margin-top:18px;

  display:flex;
  align-items:center;
  gap:8px;

  padding:12px 16px;
  border-radius:6px;

  background:var(--green-bg);
  border:1px solid rgba(74,222,128,0.2);

  color:var(--green);
  font-size:13px;
}

/* FOOTER FORM */

.form-footer{
  padding:32px 40px;
  background:rgba(0,0,0,0.2);
}

.form-zero-taxa{
  display:flex;
  align-items:center;
  gap:10px;

  margin-bottom:24px;

  padding:14px 18px;
  border-radius:8px;

  background:var(--green-bg);
  border:1px solid rgba(74,222,128,0.2);

  color:var(--green);
  font-size:13px;
  font-weight:600;
}

.btn-submit{
  width:100%;
  border:none;
  cursor:pointer;

  padding:18px 36px;
  border-radius:6px;

  background:var(--accent);
  color:#000;

  font-size:14px;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;

  position:relative;
  overflow:hidden;

  transition:.2s;
}

.btn-submit:hover{
  transform:translateY(-2px);
  box-shadow:0 16px 48px rgba(58,134,240,.4);
}

.btn-submit:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.btn-spinner{
  display:none;

  width:18px;
  height:18px;

  margin:auto;

  border:2px solid rgba(0,0,0,0.3);
  border-top-color:#000;
  border-radius:50%;

  animation:spin .7s linear infinite;
}

.btn-submit.loading .btn-text{
  display:none;
}

.btn-submit.loading .btn-spinner{
  display:block;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

/* SUCCESS */

.success-screen{
  display:none;

  max-width:600px;
  margin:0 auto;
  padding:0 24px 80px;

  text-align:center;
}

.success-screen.visible{
  display:block;
}

.success-icon{
  width:80px;
  height:80px;

  margin:0 auto 28px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:var(--green-bg);
  border:2px solid rgba(74,222,128,0.35);

  font-size:36px;
}

.success-screen h2{
  font-family:var(--D);
  font-size:clamp(2rem,6vw,3.5rem);
  letter-spacing:2px;
}

.success-screen h2 em{
  color:var(--accent);
  font-style:normal;
}

.success-screen p{
  margin:16px auto 32px;
  max-width:440px;

  color:var(--muted);
  line-height:1.8;
}

.success-details{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;

  padding:24px;
  margin-bottom:32px;

  text-align:left;
}

.sd-row{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:10px 0;
  border-bottom:1px solid var(--border);
}

.sd-row:last-child{
  border-bottom:none;
}

.sd-label{
  font-family:var(--M);
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--muted);
}

.sd-value{
  font-weight:600;
  text-align:right;
}

.btn-back{
  display:inline-flex;
  align-items:center;
  gap:8px;

  padding:14px 28px;
  border-radius:6px;

  border:1px solid var(--border);

  color:var(--text);
  text-decoration:none;

  transition:.2s;
}

.btn-back:hover{
  transform:translateY(-2px);
}

/* FOOTER */

footer{
  padding:40px 48px 24px;
  border-top:1px solid var(--border);
  background:var(--surface);
}

.footer-logo{
  font-family:var(--D);
  font-size:28px;
  color:var(--accent);
}

.footer-tagline{
  margin-top:4px;
  color:var(--muted);
  font-size:13px;
}

/* RESPONSIVO */

@media(max-width:640px){

  body{
    padding-top:95px;
  }

  nav{
    padding:14px 20px;
  }

  .nav-links{
    display:none;
  }

  .field-group{
    grid-template-columns:1fr;
  }

  .mod-toggle,
  .aloj-toggle{
    grid-template-columns:1fr;
  }

  .form-section{
    padding:28px 20px;
  }

  .form-footer{
    padding:24px 20px;
  }

  footer{
    padding:32px 20px 20px;
  }
}
</style>
</head>
